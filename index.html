    <title>Log1 Premium - iOS Edition</title>
    <style>
        /* --- GUI REFINED IOS STYLE --- */
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-gray: #8e8e93;
            --ios-sep: #c6c6c8;
            --accent-gold: #b8952a; /* Mantenuto per il brand */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: #000;
            margin: 0;
            padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            position: sticky; top: 0; z-index: 1000;
            padding: 16px;
            text-align: center;
            border-bottom: 0.5px solid var(--ios-sep);
        }

        header h1 {
            margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.4px;
        }

        .top-nav {
            margin: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .info-bar {
            text-align: center; font-size: 13px; color: var(--ios-gray);
        }

        /* iOS Grouped List Style */
        .ios-group {
            background: var(--ios-card);
            border-radius: 10px;
            margin: 0 16px 20px 16px;
            overflow: hidden;
        }

        .ios-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 11px 16px;
            border-bottom: 0.5px solid var(--ios-sep);
            min-height: 44px;
        }

        .ios-row:last-child { border-bottom: none; }

        .categoria-header {
            margin: 0 32px 8px;
            font-size: 13px; color: var(--ios-gray);
            text-transform: uppercase; font-weight: 400;
        }

        /* Inputs */
        select, .search-input, .date-input {
            width: 100%;
            background: var(--ios-card);
            border: none; border-radius: 10px;
            padding: 12px; font-size: 17px;
            outline: none; appearance: none;
        }

        .search-input {
            background-color: #e3e3e6;
            padding-left: 35px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="grey" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: 12px center;
        }

        .qty-input {
            width: 75px; height: 32px;
            background: #f2f2f7;
            border: none; border-radius: 7px;
            text-align: center; font-size: 17px; font-weight: 500;
        }

        /* Status Colors */
        .urgente { border-left: 4px solid var(--ios-red) !important; }
        .ok { border-left: 4px solid var(--ios-green) !important; }
        .vuoto { border-left: 4px solid #d1d1d6 !important; }

        /* Floating Tab Bar */
        .footer-controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 16px 20px 34px;
            border-top: 0.5px solid var(--ios-sep);
            display: flex; gap: 12px; z-index: 1000;
        }

        .btn-ios {
            flex: 1; height: 50px; border-radius: 12px;
            border: none; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }

        .btn-ios:active { opacity: 0.7; }
        .btn-save { background: var(--ios-blue); color: white; }
        .btn-wa { background: var(--ios-green); color: white; }

        /* Dialogs */
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:2000; }
        #dialog-vuoti { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; border-radius: 14px; width: 270px; padding: 0; overflow: hidden; z-index: 2001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .dialog-content { padding: 20px; text-align: center; }
        .dialog-btns { display: flex; border-top: 0.5px solid var(--ios-sep); }
        .dialog-btns button { 
            flex: 1; background: none; border: none; padding: 12px; font-size: 17px; color: var(--ios-blue); 
        }
    </style>
</head>

    const oraAttuale = new Date();
    const domani = new Date(oraAttuale); domani.setDate(oraAttuale.getDate() + 1);

    function getPasqua(anno) {
        const a = anno % 19, b = Math.floor(anno / 100), c = anno % 100, d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451), n = h + l - 7 * m + 114;
        const mese = Math.floor(n / 31), giorno = (n % 31) + 1;
        const p = new Date(anno, mese - 1, giorno);
        const lund = new Date(p); lund.setDate(p.getDate() + 1);
        return { pasqua: p.toDateString(), pasquetta: lund.toDateString() };
    }

    function isFestivo(data) {
        if (data.getDay() === 0) return true;
        const day = data.getDate(), month = data.getMonth() + 1;
        const festiviFissi = ["1-1", "6-1", "25-4", "1-5", "2-6", "15-8", "1-11", "8-12", "25-12", "26-12"];
        if (festiviFissi.includes(`${day}-${month}`)) return true;
        const { pasqua, pasquetta } = getPasqua(data.getFullYear());
        return data.toDateString() === pasqua || data.toDateString() === pasquetta;
    }

    const isWeekendDomani = isFestivo(domani);

    function bloccaNonNumerici(e) {
        const regex = /[0-9,./]/;
        if (!regex.test(e.key) && e.key !== "Backspace" && e.key !== "Tab" && e.key !== "Delete" && !e.key.includes("Arrow")) {
            e.preventDefault();
        }
    }

    function trasformaFrazione(input, soglia, index) {
        let val = input.value.trim().replace(',', '.');
        if (val === "1/3") val = "0.3";
        else if (val === "1/2") val = "0.5";
        else if (val === "2/3") val = "0.7";
        else if (val === "1/4") val = "0.25";
        else if (val === "3/4") val = "0.75";
        input.value = val;
        valuta(index, soglia);
    }

    function estraiNumeroIntelligente(t) {
        if (!t) return NaN;
        t = t.toString().toLowerCase().trim().replace(',', '.');
        try { return eval(t.replace(/(\d+)\/(\d+)/g, (m, n, d) => n/d)); } catch(e) { return parseFloat(t); }
    }

    function filtraLista() {

            if (ing.cat === "VERDURE CRUDE" && (p !== "CASTA" || oraAttuale.getDay() !== 0)) return;
            
            if (ing.cat !== currentCat) {
                currentCat = ing.cat;
                const h = document.createElement('div'); h.className = "categoria-header"; h.innerText = currentCat;
                cont.appendChild(h);
                currentGroup = document.createElement('div'); currentGroup.className = "ios-group";
                cont.appendChild(currentGroup);
            }

            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const v = s[ing.nome] || "";
            
            const row = document.createElement('div');
            row.className = `ios-row ${v===''?'vuoto':''} ing-item`;
            row.id = `box-${i}`;
            row.dataset.nome = ing.nome.toLowerCase();

            let inputHtml = (ing.nome === "cass.Cipolla") ? `
                <div style="display:flex; gap:8px; align-items:center">
                    <input type="text" class="qty-input" style="width:45px" id="sfuse-${i}" placeholder="Sfuse" onkeydown="bloccaNonNumerici(event)" onchange="trasformaFrazione(this, 0, ${i}); document.getElementById('sel-${i}').value = (this.value/20).toFixed(2); valuta(${i}, ${soglia})">

                </div>` : `
                <input type="text" class="qty-input" id="sel-${i}" placeholder=" " value="${v}" onkeydown="bloccaNonNumerici(event)" onchange="trasformaFrazione(this, ${soglia}, ${i})">`;

            row.innerHTML = `
                <div style="display:flex; flex-direction:column">
                    <span style="font-size:16px; font-weight:400">${ing.nome}</span>
                    <span style="font-size:12px; color:var(--ios-gray)">Min: ${soglia}</span>

                ${inputHtml}

            currentGroup.appendChild(row);
            if(v !== "") valuta(i, soglia);

        });
        h += `</div>`;
        cont.innerHTML = `<div class="categoria-header">Casta | Silea | Biban</div>` + h;
    }

    async function syncCloud(data = null) {
        const status = document.getElementById('sync-status');
        try {
            if (data) {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(data)
                });
                status.innerText = '✅ Sync OK';
            } else {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
                const cloudData = await res.json();
                if(cloudData.record) {
                    Object.keys(cloudData.record).forEach(key => localStorage.setItem(key, cloudData.record[key]));
                    status.innerText = '✅ Sync OK';
                    creaLista();
                }
            }
        } catch (e) { status.innerText = '❌ Errore Cloud'; }
    }

    function controllaESalva() {
        const p = document.getElementById('pizzeria').value;
        const vuoti = [];
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value.trim() === "" && !ing.noObbligo) {
                if (!((ing.nome === "Lievito" && p !== "BIBAN") || (ing.nome === "Pel.Salsa" && p !== "CASTA"))) vuoti.push(ing.nome);
            }
        });
        if (vuoti.length > 0) {
            document.getElementById('lista-nomi-vuoti').innerText = vuoti.slice(0,3).join(", ") + (vuoti.length > 3 ? "..." : "");
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('dialog-vuoti').style.display = 'block';
        } else { eseguiSalva(); }
    }

    async function eseguiSalva(forza = false) {
        const p = document.getElementById('pizzeria').value;
        const d = {};
        ingredienti.forEach((ing, i) => { const input = document.getElementById(`sel-${i}`); if(input) d[ing.nome] = input.value; });
        localStorage.setItem('inventario_dati_'+p, JSON.stringify(d));
        const cloud = {}; for(let i=0; i<localStorage.length; i++) cloud[localStorage.key(i)] = localStorage.getItem(localStorage.key(i));
        await syncCloud(cloud);
        chiudiDialog();
        alert("✅ Salvato nel Cloud");
    }

    function valuta(i, s) {
        const input = document.getElementById(`sel-${i}`);
        if(!input) return;
        const v = estraiNumeroIntelligente(input.value);
        document.getElementById(`box-${i}`).className = `ios-row ${isNaN(v) ? 'vuoto' : (v < s ? 'urgente' : 'ok')} ing-item`;
    }

    function inviaWhatsApp() {
        const p = document.getElementById('pizzeria').value;
        let msg = `🏪 *INV. ${p}*\n\n`;
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value !== "") {
                const v = estraiNumeroIntelligente(input.value);
                const s = isWeekendDomani ? ing.we : ing.fer;
                if(v < s) msg += `• *${ing.nome}*: ${input.value}\n`;
            }
        });
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }

    function chiudiDialog() { document.getElementById('overlay').style.display = 'none'; document.getElementById('dialog-vuoti').style.display = 'none'; }
    function cambiaPizzeria() { localStorage.setItem('ultima_pizzeria', document.getElementById('pizzeria').value); creaLista(); }

    window.onload = async function() {
        const nomiGiorni = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
        document.getElementById('info-giorno').innerHTML = `Domani: <b>${nomiGiorni[domani.getDay()]}</b> ${isWeekendDomani?'(FEST)':''}`;
        const uP = localStorage.getItem('ultima_pizzeria');
        if(uP) { document.getElementById('pizzeria').value = uP; creaLista(); }
        await syncCloud();
    };
</script>
</body>
</html>
